<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pharos">
  <title>Pharos</title>
  <defs>
    <linearGradient id="beam" x1="32" y1="8" x2="32" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe1a3"/>
      <stop offset="0.55" stop-color="#f5a72c"/>
      <stop offset="1" stop-color="#e08a1e"/>
    </linearGradient>
  </defs>
  <!-- Haz del faro segmentado en elementos diferenciales (dx) -->
  <g fill="url(#beam)">
    <polygon points="31,11 33,11 35.7,20 28.3,20" rx="1"/>
    <polygon points="27,23 37,23 40.3,33 23.7,33"/>
    <polygon points="22.7,36 41.3,36 44.7,46 19.3,46"/>
    <polygon points="18.3,49 45.7,49 47.7,55 16.3,55"/>
  </g>
  <!-- Punta luminosa del faro -->
  <circle cx="32" cy="8.5" r="2.4" fill="#fff3d6"/>
  <!-- Horizonte (línea cálida tenue) -->
  <line x1="9" y1="58.5" x2="55" y2="58.5" stroke="#b86a22" stroke-width="1.4" stroke-linecap="round" opacity="0.75"/>
</svg>